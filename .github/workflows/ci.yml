name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_AMBIENT_API_KEY: ${{ secrets.VITE_AMBIENT_API_KEY }}
          VITE_AMBIENT_APP_KEY: ${{ secrets.VITE_AMBIENT_APP_KEY }}
          VITE_SYNOPTIC_TOKEN: ${{ secrets.VITE_SYNOPTIC_TOKEN }}

      - name: Check build output
        run: ls -la dist/
