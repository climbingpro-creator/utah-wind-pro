<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>NotWindy - Fishing & Boating Intelligence</title>
    <meta name="description" content="AI-powered fishing conditions, glass water predictions, and boating intelligence. Click any water body worldwide for instant fishing intel." />
    <meta name="application-name" content="NotWindy" />
    
    <!-- iOS Safari specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NotWindy" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- Prevent iOS from auto-detecting phone numbers and styling them -->
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Prevent iOS zoom on input focus (font-size >= 16px also helps) -->
    <style>
      /* Ensure inputs don't trigger iOS zoom */
      input, select, textarea {
        font-size: 16px !important;
      }
      /* Prevent pull-to-refresh interference */
      html, body {
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
